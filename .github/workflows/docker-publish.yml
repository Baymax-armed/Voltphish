name: Publish Docker image

# Builds the VoltPhish image and pushes it to Docker Hub so `docker pull`,
# `docker search voltphish`, and the Docker Hub website can all find it.
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   Secrets:
#     DOCKERHUB_USERNAME  the Docker Hub account you LOG IN as (e.g. nady0506)
#     DOCKERHUB_TOKEN     a Docker Hub access token (Account → Security → New
#                         Access Token, "Read & Write"). Never your password.
#   Variables (optional):
#     DOCKERHUB_NAMESPACE the namespace the image is PUSHED under — set this to
#                         a Docker Hub Organization name (e.g. baymax-armed) if
#                         you want a branded image name. Defaults to the login
#                         username when unset. You must own/belong to the org.
#
# Then publish by pushing a version tag:  git tag v1.0.0 && git push origin v1.0.0
# (or run this workflow manually from the Actions tab).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to publish (e.g. 1.0.0). 'latest' is always published."
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generates tags/labels: :latest, the semver from the git tag, and the
      # OCI metadata (title/description/source) that Docker Hub displays.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}/voltphish
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=VoltPhish
            org.opencontainers.image.description=Free, open-source, self-hosted phishing simulation and security-awareness training platform.
            org.opencontainers.image.licenses=MIT

      # amd64 only for now — it's native on the runner (~2-3 min) and covers
      # nearly all servers/desktops. arm64 via QEMU emulation was taking 40+ min;
      # it'll be re-added later using a native arm64 runner (fast, no emulation).
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: the Docker Hub description/overview is set manually on the Hub page.
      # The old auto-sync step (peter-evans/dockerhub-description) was removed
      # because that API endpoint rejects Personal Access Token auth (403
      # Forbidden) and only accepts the account password, which we don't want to
      # store in CI. The Overview text lives in docs/DOCKERHUB.md — paste it once
      # at https://hub.docker.com/r/<namespace>/voltphish → Edit.
