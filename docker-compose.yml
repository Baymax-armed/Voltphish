# One-command startup:  docker compose up --build
# Then open http://localhost:8010  (first-run admin password is printed to logs).
services:
  voltphish:
    build: .
    image: voltphish:latest
    ports:
      # Host 8010 → container 8080. VoltPhish is on 8010 so 8080 stays free for
      # your pentest tooling (Burp, etc.). Open http://localhost:8010.
      - "8010:8080"
    environment:
      # ── First-run admin ──────────────────────────────────────
      # RECOMMENDED: set a stable password below so you always know it and
      # never depend on the one-time generated password in the logs. When set,
      # there is no forced "change password" step. (Only applies on first run /
      # a fresh data volume — an existing admin's password is never overwritten.)
      VOLTPHISH_BOOTSTRAP_ADMIN_EMAIL: "admin@example.com"
      # VOLTPHISH_BOOTSTRAP_ADMIN_PASSWORD: "choose-a-strong-password-min-12-chars"

      # ── Delivery ─────────────────────────────────────────────
      # Emails are delivered via the campaign's Sending Profile (real SMTP or an
      # Email API like Brevo/SendGrid). Create one under "Sending Profiles" and
      # use Verify + Send test to confirm it works.
      VOLTPHISH_MAIL_BACKEND: "smtp"

      # The public base URL recipients' tracking links resolve to.
      # For local testing this is fine; in a real test set it to the
      # authorized host recipients can reach.
      VOLTPHISH_PHISH_BASE_URL: "http://localhost:8010"

      # ── Public link via Cloudflare Tunnel (optional) ─────────
      # When the `cloudflared` sidecar below is running, the app reads its live
      # public URL from this metrics endpoint and offers it in the campaign form
      # as a selectable Phishing URL — no custom domain needed. Harmless if the
      # sidecar isn't running (the option just won't appear).
      VOLTPHISH_TUNNEL_METRICS_URL: "http://cloudflared:20241"

      # ── Production hardening (uncomment for a real deployment) ─
      # VOLTPHISH_ENV: "production"
      # VOLTPHISH_SECRET_KEY: "<64+ random chars>"
      # VOLTPHISH_COOKIE_SECURE: "true"   # requires serving over HTTPS
    volumes:
      # All data (users, campaigns, DB) lives here and PERSISTS across restarts
      # and rebuilds. WARNING: `docker compose down -v` DELETES this volume and
      # everything in it (including your password). Use plain `docker compose
      # down` / `stop` / `restart` to keep your data.
      - voltphish-data:/data
    restart: unless-stopped

  # Free public link for landing pages/tracking, no custom domain required.
  # OPT-IN: only starts when you ask for it, because it exposes the app to the
  # internet (admin login included — enable admin 2FA, and stop it when you're
  # not running a live campaign):
  #     docker compose --profile tunnel up -d
  #     docker compose stop cloudflared        # take it down again
  # The app auto-detects the assigned https://…trycloudflare.com URL and shows
  # it in the New Campaign form. The URL changes each time this restarts.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://voltphish:8080 --metrics 0.0.0.0:20241
    depends_on:
      - voltphish
    restart: unless-stopped
    profiles:
      - tunnel

  # Stable public URL on YOUR OWN domain (survives restarts). One-time setup:
  #   1. Cloudflare dashboard → Zero Trust → Networks → Tunnels → Create a tunnel
  #      → pick "Cloudflared" → copy the token.
  #   2. Add a Public Hostname routing your domain → http://voltphish:8080
  #   3. Put the token in a .env file next to this compose:
  #        CLOUDFLARE_TUNNEL_TOKEN=eyJ...   VOLTPHISH_PUBLIC_URL=https://phish.yourdomain.com
  #   4. Set the campaign's Phishing URL to that domain via the "Custom URL…"
  #      option (and, if you use auto-enroll emails, set the app's
  #      VOLTPHISH_PHISH_BASE_URL above to the same domain).
  #   5. docker compose --profile tunnel-named up -d
  cloudflared-named:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - voltphish
    restart: unless-stopped
    profiles:
      - tunnel-named

volumes:
  voltphish-data:
